<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bot.css">
    
    <style>
        /* ESTO ES SOLO PARA QUE NO SE VEA BLANCO EL FONDO AHORA */
        body { background-color: #e0e0e0; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        h1 { text-align: center; }
    </style>
</head>
<body>

    <h1>Aquí irá la portada del TFG...<br>El bot está ahi abajo</h1>

    <div id="chat-widget">
        <button id="chat-toggle-btn">
            💬 <span class="notification-dot">1</span>
        </button>

        <div id="chat-window" class="hidden">
            <header class="chat-header">
                <span>🤖 Soporte PlayGo</span>
                <button id="chat-close-btn">✖</button>
            </header>
            <div id="chat-messages" class="chat-body"></div>
            <footer class="chat-footer">
                <input type="text" id="chat-input" placeholder="Escribe aquí..." disabled>
                <button id="chat-send-btn">➤</button>
            </footer>
        </div>
    </div>
    <script src="bot.js"></script>
</body>
</html>

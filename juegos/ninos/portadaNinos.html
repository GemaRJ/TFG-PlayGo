<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Infantiles</title>
    <link rel="stylesheet" href="common/base_kids.css">
    <style>
        body {
            /* flex-direction: column is used to align title and grid */
            flex-direction: column;
            padding: 2rem;
            justify-content: flex-start;
        }

        h1 {
            margin-top: 2rem;
            margin-bottom: 2rem;
            font-size: 3rem;
            color: var(--white);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .games-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 4rem;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: var(--shadow-soft, 0 10px 30px rgba(0, 0, 0, 0.3));
            border: 4px solid var(--white, #fff);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text, #2c3e50);
            min-height: 260px;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary, #FF9A9E);
            box-shadow: 0 15px 40px rgba(255, 154, 158, 0.4);
        }

        .game-card img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 20px var(--glow));
            border: 3px solid var(--accent-primary);
            box-shadow: 0 0 30px var(--glow),
                0 0 50px var(--shadow);
            transition: all 0.3s ease;
        }

        .game-card h3 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--primary, #4a90e2);
            font-family: var(--font-title, 'Fredoka One', cursive);
        }


        /* ========================================
   LOGO
======================================== */

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            animation: slideDown 0.8s ease-out, float 3s ease-in-out infinite;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .logo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 20px var(--glow));
            border: 3px solid var(--accent-primary);
            box-shadow: 0 0 30px var(--glow),
                0 0 50px var(--shadow);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
            filter: drop-shadow(0 0 30px var(--accent-primary));
        }
    </style>
</head>

<body class="fondo-menu">

    <h1>Juegos Infantiles</h1>

    <div class="games-panel">
        <a href="cuenta_numeros/index.html" class="game-card">
            <div class="logo-container">
                <img src="cuenta_numeros/imagenes/logoCuentaNumeros.png" alt="Cuenta Números">
            </div>
            <h3>Cuenta Números</h3>
        </a>
        <a href="cuenta_letras/index.html" class="game-card">
            <div class="logo-container">
                <img src="cuenta_letras/utils/imagenes/logoCuentaLetras.png" alt="CuentaLetras Logo" class="logo">
            </div>
            <h3>Cuenta Letras</h3>
        </a>
        <a href="memory/index.html" class="game-card">
            <div class="logo-container">
                <img src="memory/img/logoMemory.png" alt="Memory">
            </div>
            <h3>Memory</h3>
        </a>
        <a href="tres_raya/index.html" class="game-card">
            <div class="logo-container">
                <img src="tres_raya/utils/img/logoTresRaya.png" alt="Tres en Raya">
            </div>
            <h3>Tres en Raya</h3>
        </a>
        <a href="trivial/index.html" class="game-card">
            <div class="logo-container">
                <img src="trivial/img/logoTrivial.png" alt="Trivial">
            </div>
            <h3>Trivial</h3>
        </a>
        <a href="tabu/index.html" class="game-card">
            <div class="logo-container">
                <img src="tabu/img/logoTabu.jpg" alt="Tabú">
            </div>
            <h3>Tabú</h3>
        </a>


    </div>

</body>

</html>

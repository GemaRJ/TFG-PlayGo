<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clasificación - PlayGo</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="./utils/style.css" />
  </head>
  <body>
    <div class="game-card text-center">
      <h1 class="mb-4" data-key="tr_ranking">🏆 Clasificación 🏆</h1>

      <div id="summary-box" class="my-4">
        <p class="text-muted" data-key="tr_loading_res">Cargando resultados...</p>
      </div>

      <div class="d-flex flex-column gap-2">
        <button id="btn-home" class="btn-custom btn-primary" data-key="tr_home_btn">
          🏠 Menú Principal
        </button>

        <button
          id="btn-clear"
          class="btn-custom btn-warning py-2"
          style="font-size: 0.9rem"
          data-key="tr_clear_btn"
        >
          🗑️ Borrar Historial
        </button>
      </div>
    </div>

    <script src="./utils/resultado.js"></script>
    <script src="idiomas.js"></script>
    <script src="../../../utils/traductor.js"></script>
  </body>
</html>

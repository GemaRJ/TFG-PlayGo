<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayGo - 3 en Raya</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="./utils/style.css" />
  </head>
  <body>
    <div class="game-card text-center">
      <h2 id="status-text" class="mb-4" data-key="tr_loading">Cargando...</h2>

      <div id="game-board" class="mx-auto mb-4">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
      </div>

      <div class="d-flex flex-column gap-2">
        <button
          id="btn-restart"
          class="btn-custom btn-warning py-3"
          style="display: none"
          data-key="tr_again_btn"
        >
          🔄 Otra Vez
        </button>

        <button id="btn-exit" class="btn-custom btn-secondary py-3" data-key="tr_exit_btn">
          🏠 Salir / Resultados
        </button>
      </div>
    </div>

    <script src="./utils/juego.js"></script>
    <script src="idiomas.js"></script>
    <script src="../../../utils/traductor.js"></script>
  </body>
</html>
